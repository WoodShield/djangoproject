<div class="card shadow-sm border-0 h-100">
    <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between align-items-center">
        <span><i class="bi bi-bullseye"></i> 独立型・多目的最適化ハブ</span>
        <div>
            <button class="btn btn-sm btn-warning fw-bold me-2" onclick="openManageModal()"><i class="bi bi-gear-fill"></i> モデルの管理・削除</button>
            <button id="refreshModelListBtn" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-clockwise"></i> ライブラリ更新</button>
        </div>
    </div>

    <div class="card-body bg-light">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body">
                        <h6 class="fw-bold text-primary mb-3">1. 学習済みモデルの選択</h6>
                        <div id="savedModelList" class="list-group mb-3" style="max-height: 300px; overflow-y: auto;">
                            <p class="text-muted small p-3 text-center">モデルを読み込んでいます...</p>
                        </div>
                    </div>
                </div>

                <div id="goalSettingArea" class="card shadow-sm border-0 d-none">
                    <div class="card-body">
                        <h6 class="fw-bold text-success mb-3">2. 各ターゲットの目標値設定</h6>
                        <div id="dynamicGoalInputs"></div>
                        <button id="runMultiOptimizeBtn" class="btn btn-success w-100 fw-bold mt-3 shadow-sm py-2">
                            <i class="bi bi-lightning-charge-fill"></i> 最適レシピを逆解析する
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm border-0 h-100" style="min-height: 500px;">
                    <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
                        <span>AI推奨レシピ (Top 5 Solutions)</span>
                        <div id="chartControls" class="d-none d-flex align-items-center gap-2">
                            <label class="small fw-bold text-muted">表示軸:</label>
                            <div id="axisSelectArea" class="d-flex gap-1">
                                <select id="xAxisSelect" class="form-select form-select-sm"></select>
                                <select id="yAxisSelect" class="form-select form-select-sm"></select>
                            </div>
                        </div>
                    </div>
                    <div class="card-body" id="simResultBody">
                        <div id="simPlaceholder" class="text-center text-muted p-5">
                            <i class="bi bi-search display-4 mb-3 d-block"></i>
                            <p>左側でモデルを選択し、目標値を入力してください。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modelManageModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content shadow-lg border-0">
          <div class="modal-header bg-warning text-dark border-0">
            <h5 class="modal-title fw-bold"><i class="bi bi-gear-fill"></i> 保存済みモデルの管理</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-0">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead class="table-light"><tr><th>ターゲット(Y) / メモ</th><th>アルゴリズム</th><th>精度 (R²/Acc)</th><th>作成日時</th><th>削除</th></tr></thead>
                <tbody id="modelManageTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const modelListGroup = document.getElementById('savedModelList');
    const goalArea = document.getElementById('goalSettingArea');
    const goalInputs = document.getElementById('dynamicGoalInputs');
    const runBtn = document.getElementById('runMultiOptimizeBtn');
    const simResultBody = document.getElementById('simResultBody');

    let selectedModelIds = [];
    let currentModels = [];

    const algoNames = {'rf': 'RF', 'bayesian': 'ﾍﾞｲｽﾞ', 'poly': '多項式', 'logistic': 'ﾛｼﾞｽﾃｨｯｸ', 'linear': '線形', 'gbr': 'GBR', 'ridge': 'ﾘｯｼﾞ', 'lasso': 'ﾗｯｿ'};
    const algoNamesFull = {'rf': 'ランダムフォレスト', 'bayesian': 'ベイズ', 'poly': '多項式', 'logistic': 'ロジスティック', 'linear': '線形', 'gbr': '勾配ブースティング', 'ridge': 'リッジ', 'lasso': 'ラッソ'};

    window.loadSavedModelLibrary = function() {
        const databaseSelect = document.getElementById('targetThemeSelect');
        const databaseId = databaseSelect ? databaseSelect.value : null;

        if(!databaseId) {
            modelListGroup.innerHTML = '<div class="alert alert-warning m-3 small"><i class="bi bi-exclamation-triangle-fill"></i> 「1. データ準備」タブで対象データベースを選択してください。</div>';
            return;
        }

        modelListGroup.innerHTML = '<p class="text-muted small p-3 text-center"><span class="spinner-border spinner-border-sm"></span> モデルを検索中...</p>';

        fetch(`/dept/{{ workspace.pk }}/api/model/list/?database_id=${databaseId}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                currentModels = data.models;
                if(data.models.length === 0) {
                    modelListGroup.innerHTML = '<p class="text-muted small p-3 text-center">保存されたモデルがありません。<br>先にPhase 3で学習を行ってください。</p>';
                    return;
                }
                
                modelListGroup.innerHTML = data.models.map(m => {
                    const algoStr = algoNames[m.metrics.algorithm] || '不明';
                    const memoStr = m.preprocessing_meta.memo ? `<span class="badge bg-info text-dark ms-2"><i class="bi bi-chat-text"></i> ${m.preprocessing_meta.memo}</span>` : '';
                    
                    return `
                    <label class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                        <div>
                            <div class="d-flex align-items-center mb-1">
                                <input class="form-check-input me-2 model-select-chk" type="checkbox" value="${m.id}" data-target="${m.target}">
                                <strong class="text-primary">${m.target}</strong>
                                ${memoStr}
                            </div>
                            <div class="extra-small text-muted">
                                <span class="badge bg-secondary me-1">${algoStr}</span>
                                R²: ${m.metrics.r2} | MAE: ${m.metrics.mae} <br>
                                <i class="bi bi-clock"></i> ${m.created_at}
                            </div>
                        </div>
                    </label>
                    `;
                }).join('');

                document.querySelectorAll('.model-select-chk').forEach(chk => {
                    chk.addEventListener('change', updateGoalFields);
                });
            } else {
                modelListGroup.innerHTML = `<p class="text-danger small p-3 text-center">エラー: ${data.message}</p>`;
            }
        })
        .catch(err => {
            modelListGroup.innerHTML = '<p class="text-danger small p-3 text-center">通信エラーが発生しました</p>';
        });
    };

    window.openManageModal = function() {
        const databaseId = document.getElementById('targetThemeSelect').value;
        if(!databaseId) return alert('テーマを選択してください。');
        
        const tbody = document.getElementById('modelManageTableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="p-4"><span class="spinner-border"></span></td></tr>';
        
        new bootstrap.Modal(document.getElementById('modelManageModal')).show();
        
        fetch(`/dept/{{ workspace.pk }}/api/model/list/?database_id=${databaseId}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                tbody.innerHTML = data.models.map(m => {
                    const algoStr = algoNamesFull[m.metrics.algorithm] || '不明';
                    const memoStr = m.preprocessing_meta.memo ? `<br><small class="text-muted"><i class="bi bi-chat-text"></i> ${m.preprocessing_meta.memo}</small>` : '';
                    return `
                    <tr>
                        <td class="text-start">
                            <span class="fw-bold text-primary">${m.target}</span>
                            ${memoStr}
                        </td>
                        <td><span class="badge bg-secondary">${algoStr}</span></td>
                        <td>${m.metrics.r2}</td>
                        <td class="small">${m.created_at}</td>
                        <td><button class="btn btn-sm btn-outline-danger fw-bold delete-model-btn" data-id="${m.id}"><i class="bi bi-trash"></i></button></td>
                    </tr>
                    `;
                }).join('');
                
                document.querySelectorAll('.delete-model-btn').forEach(btn => {
                    btn.onclick = function() {
                        if(!confirm('本当にこのモデルを削除しますか？\n（復元できません）')) return;
                        fetch("{% url 'api_delete_model' workspace.pk %}", {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
                            body: JSON.stringify({ model_id: this.dataset.id })
                        })
                        .then(res => res.json())
                        .then(d => {
                            if(d.status === 'success') {
                                const modalEl = document.getElementById('modelManageModal');
                                const modalInstance = bootstrap.Modal.getInstance(modalEl);
                                if (modalInstance) modalInstance.hide();
                                loadSavedModelLibrary();
                                setTimeout(() => { openManageModal(); }, 300);
                            } else { alert(d.message); }
                        });
                    }
                });
            }
        });
    };

    function updateGoalFields() {
        const checked = document.querySelectorAll('.model-select-chk:checked');
        selectedModelIds = Array.from(checked).map(c => c.value);
        
        if(selectedModelIds.length > 0) {
            goalArea.classList.remove('d-none');
            goalInputs.innerHTML = Array.from(checked).map(c => {
                const modelId = parseInt(c.value);
                const targetName = c.dataset.target;
                const modelData = currentModels.find(m => m.id === modelId);
                
                let inputHtml = '';
                let labelMap = null;

                if (modelData && modelData.preprocessing_meta && modelData.preprocessing_meta.label_mappings) {
                    labelMap = modelData.preprocessing_meta.label_mappings[targetName];
                }

                if (labelMap && Object.keys(labelMap).length > 0) { 
                    const options = Object.entries(labelMap).map(([text, val]) => 
                        `<option value="${val}">${text} (内部数値: ${val})</option>`
                    ).join('');
                    
                    inputHtml = `
                        <select class="form-select goal-input" data-id="${c.value}" data-name="${targetName}" required>
                            <option value="" disabled selected>選択してください</option>
                            ${options}
                        </select>
                    `;
                } else {
                    inputHtml = `<input type="number" step="any" class="form-control goal-input" data-id="${c.value}" data-name="${targetName}" placeholder="数値を入力" required>`;
                }

                return `
                <div class="mb-3 p-3 border-start border-success border-4 bg-white shadow-sm position-relative">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-2 remove-goal-btn" aria-label="Close" data-id="${c.value}" title="このモデルの選択を解除"></button>
                    <label class="form-label small fw-bold text-success">${targetName} の目標値</label>
                    ${inputHtml}
                </div>
                `;
            }).join('');

            document.querySelectorAll('.remove-goal-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const removeId = this.getAttribute('data-id');
                    const chk = document.querySelector(`.model-select-chk[value="${removeId}"]`);
                    if(chk) chk.checked = false;
                    updateGoalFields();
                });
            });

        } else {
            goalArea.classList.add('d-none');
        }
    }

    document.getElementById('refreshModelListBtn').onclick = loadSavedModelLibrary;

    const simulationTabBtn = document.getElementById('simulation-tab');
    if (simulationTabBtn) {
        simulationTabBtn.addEventListener('shown.bs.tab', function (e) {
            loadSavedModelLibrary();
        });
    }

    runBtn.onclick = function() {
        const goals = {};
        let hasEmpty = false;
        document.querySelectorAll('.goal-input').forEach(i => {
            if(i.value === '') hasEmpty = true;
            goals[i.dataset.id] = i.value;
        });

        if(hasEmpty) {
            alert('すべての目標値を入力してください。');
            return;
        }

        runBtn.disabled = true;
        runBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 仮想空間を探索中...';
        
        simResultBody.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status"></div><p class="mt-3 fw-bold text-success">数万パターンの配合をAIがシミュレーションしています...</p></div>';

        fetch("{% url 'api_optimize_recipe' workspace.pk %}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
            body: JSON.stringify({ model_ids: selectedModelIds, target_goals: goals })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                renderResults(data);
            } else {
                simResultBody.innerHTML = `<div class="alert alert-danger">エラー: ${data.message}</div>`;
            }
        })
        .catch(err => {
            console.error("Fetch Error:", err);
            simResultBody.innerHTML = `<div class="alert alert-danger">通信エラーまたはシステムエラーが発生しました</div>`;
        })
        .finally(() => {
            runBtn.disabled = false;
            runBtn.innerHTML = '<i class="bi bi-lightning-charge-fill"></i> 最適レシピを逆解析する';
        });
    };

    function renderResults(data) {
        const results = data.results || data; 
        const bgPoints = data.background_points || []; 
        const chartControls = document.getElementById('chartControls');

        if (!results || results.length === 0) {
            simResultBody.innerHTML = '<div class="alert alert-warning">条件を満たす結果が見つかりませんでした。</div>';
            chartControls.classList.add('d-none');
            return;
        }

        const predKeys = Object.keys(results[0]).filter(k => k.startsWith('pred_'));
        const featureKeys = Object.keys(results[0]).filter(k => !k.startsWith('pred_') && k !== 'total_error');
        const yNames = predKeys.map(k => k.replace('pred_', ''));

        let tableHtml = '<div class="table-responsive"><table class="table table-sm table-bordered table-hover text-center small align-middle text-nowrap">';
        tableHtml += '<thead class="table-light"><tr><th>Rank</th>';
        predKeys.forEach(k => tableHtml += `<th class="text-primary fw-bold px-2"><i class="bi bi-bullseye"></i> ${k.replace('pred_', '')} <span class="text-muted extra-small">(予測)</span></th>`);
        featureKeys.forEach(k => tableHtml += `<th>${k}</th>`);
        tableHtml += '</tr></thead><tbody>';
        results.forEach((row, idx) => {
            let badgeColor = idx === 0 ? 'bg-warning text-dark' : 'bg-secondary';
            tableHtml += `<tr><td><span class="badge ${badgeColor}">No.${idx + 1}</span></td>`;
            predKeys.forEach(k => tableHtml += `<td class="fw-bold text-primary bg-light">${row[k].toFixed(2)}</td>`);
            featureKeys.forEach(k => {
                let val = row[k];
                if (typeof val === 'number') val = val.toFixed(2);
                tableHtml += `<td>${val}</td>`;
            });
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table></div>';
        
        simResultBody.innerHTML = tableHtml;

        try {
            if (predKeys.length >= 2) {
                simResultBody.innerHTML += '<div id="recipeChart" style="height: 450px;" class="mt-4 border-top pt-3"></div>';
                chartControls.classList.remove('d-none');
                
                const xSel = document.getElementById('xAxisSelect');
                const ySel = document.getElementById('yAxisSelect');

                xSel.innerHTML = predKeys.map((k, i) => `<option value="${k}" ${i===0?'selected':''}>X軸: ${yNames[i]}</option>`).join('');
                ySel.innerHTML = predKeys.map((k, i) => `<option value="${k}" ${i===1?'selected':''}>Y軸: ${yNames[i]}</option>`).join('');

                const draw2D = () => {
                    const keyX = xSel.value;
                    const keyY = ySel.value;
                    const nameX = keyX.replace('pred_', '');
                    const nameY = keyY.replace('pred_', '');
                    
                    const goalInputX = document.querySelector(`.goal-input[data-name="${nameX}"]`);
                    const goalInputY = document.querySelector(`.goal-input[data-name="${nameY}"]`);
                    const goalX = goalInputX ? parseFloat(goalInputX.value) : null;
                    const goalY = goalInputY ? parseFloat(goalInputY.value) : null;

                    const traces = [];
                    
                    traces.push({
                        x: bgPoints.map(r => r[keyX]), y: bgPoints.map(r => r[keyY]),
                        mode: 'markers', type: 'scatter', 
                        marker: { color: 'rgba(13, 110, 253, 0.4)', size: 5 },
                        name: '試行データ'
                    });
                    
                    traces.push({
                        x: results.map(r => r[keyX]), y: results.map(r => r[keyY]),
                        mode: 'markers', 
                        type: 'scatter', 
                        text: ['No.1', 'No.2', 'No.3', 'No.4', 'No.5'], 
                        hovertemplate: '<b>%{text}</b><br>X: %{x}<br>Y: %{y}<extra></extra>', 
                        marker: { color: '#ffc107', size: 10, line: {color: '#333', width: 1.5} }, 
                        name: 'Top 5 '
                    });

                    const shapes = [];
                    if (goalX !== null && !isNaN(goalX)) {
                        shapes.push({
                            type: 'line', x0: goalX, x1: goalX, y0: 0, y1: 1, yref: 'paper',
                            line: { color: 'red', width: 1.5, dash: 'dot' }
                        });
                    }
                    if (goalY !== null && !isNaN(goalY)) {
                        shapes.push({
                            type: 'line', x0: 0, x1: 1, xref: 'paper', y0: goalY, y1: goalY,
                            line: { color: 'red', width: 1.5, dash: 'dot' }
                        });
                    }

                    Plotly.newPlot('recipeChart', traces, {
                        title: { text: `2Dトレードオフ解析: ${nameX} vs ${nameY}`, font: { size: 14, weight: 'bold' } },
                        xaxis: { title: nameX }, yaxis: { title: nameY }, margin: { t: 40, b: 50, l: 50, r: 20 },
                        shapes: shapes
                    }, {responsive: true});
                };

                xSel.onchange = draw2D;
                ySel.onchange = draw2D;

                draw2D(); 
            } else {
                chartControls.classList.add('d-none');
            }
        } catch (err) {
            console.error("グラフ描画エラー:", err);
        }
    }
});
</script>
